<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Corralejo local map test</title>
  <link rel="stylesheet" href="assets/vendor/maplibre-gl.css">
  <style>
    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .map-error {
      box-sizing: border-box;
      width: min(90%, 600px);
      margin: 40px auto;
      padding: 20px;
      color: #252525;
      background: #fffdf8;
      border: 1px solid #ff6c66;
      border-radius: 12px;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <script src="assets/vendor/maplibre-gl.js"></script>
  <script src="assets/vendor/pmtiles.js"></script>
  <script src="js/navigation-map.js"></script>
  <script>
    try {
      const archiveUrl = new URL(
        "assets/maps/corralejo.pmtiles",
        window.location.href
      ).href;

      initialisePmtilesProtocol(archiveUrl);

      const map = new maplibregl.Map({
        container: "map",
        style: createCorralejoMapStyle(archiveUrl),
        center: [-13.865, 28.738],
        zoom: 14.5,
        maxZoom: 18,
        attributionControl: false
      });

      map.addControl(new maplibregl.NavigationControl(), "top-right");
      map.addControl(
        new maplibregl.AttributionControl({ compact: true }),
        "bottom-right"
      );

      map.on("load", () => {
        console.log("Local Corralejo PMTiles map loaded successfully.");
      });
    } catch (error) {
      console.error(error);
      document.querySelector("#map").innerHTML = `
        <div class="map-error">
          <strong>The local Corralejo map could not load.</strong>
          <p>Open the browser console for the exact error.</p>
        </div>
      `;
    }
  </script>
</body>
</html>
