<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#155d6c">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Discover Corralejo">

  <title>Choose your language | Tour app</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="welcome-screen">
  <main class="welcome-stage">
    <section class="welcome-cover" aria-labelledby="welcome-title">
      <div class="welcome-cover-shade"></div>

      <header class="welcome-cover-header">
        <div class="welcome-brand" aria-label="Discover Corralejo">
          <span class="brand-symbol brand-symbol-small" aria-hidden="true">
            <span class="brand-symbol-dot"></span>
          </span>
          <span data-app-name>Discover Corralejo</span>
        </div>

        <button
          id="language-toggle-button"
          class="welcome-language-toggle"
          type="button"
          aria-controls="language-sheet"
          aria-expanded="true"
        >
          <span id="selected-language-code">EN</span>
          <span aria-hidden="true">⌄</span>
        </button>
      </header>

      <div class="welcome-cover-copy">
        <p class="eyebrow eyebrow-light" data-i18n="welcomeEyebrow">
          A self-guided walking tour
        </p>

        <h1 id="welcome-title">
          <span>Discover</span>
          <span>Corralejo</span>
        </h1>

        <span class="welcome-coral-rule" aria-hidden="true"></span>

        <p class="welcome-tagline" data-i18n="welcomeTagline">
          Discover Corralejo through its coastline, local stories and hidden corners.
        </p>

        <div class="welcome-stats" aria-label="Tour details">
        </div>
      </div>

      <div class="welcome-actions">
        <button
          id="start-tour-button"
          class="button button-coral welcome-start-button"
          type="button"
          data-i18n="startTour"
          disabled
        >
          Start tour
        </button>

        <button
          id="change-language-button"
          class="welcome-change-language"
          type="button"
          data-i18n="changeLanguage"
        >
          Change language
        </button>
      </div>
    </section>

    <section
      id="language-sheet"
      class="welcome-language-sheet is-open"
      aria-labelledby="language-title"
    >
      <div class="language-sheet-handle" aria-hidden="true"></div>

      <div class="language-sheet-heading">
        <div>
          <p class="eyebrow" data-app-name>Discover Corralejo</p>

          <h2 id="language-title" data-i18n="chooseLanguage">
            Choose your language
          </h2>

          <p class="text-muted" data-i18n="chooseLanguageHelp">
            You can change this later.
          </p>
        </div>

        <button
          id="language-sheet-close"
          class="language-sheet-close"
          type="button"
          aria-label="Close language selection"
        >
          ×
        </button>
      </div>

      <div
        id="language-grid"
        class="language-grid"
        aria-live="polite"
      ></div>

      <p
        id="language-selection-message"
        class="form-help"
        data-i18n="selectLanguageFirst"
      >
        Choose a language to continue.
      </p>
    </section>
  </main>

  <script src="js/data-loader.js"></script>
  <script src="js/common.js"></script>
  <script src="js/analytics.js"></script>
  <script src="js/offline.js"></script>
  <script src="js/index.js"></script>
  <script src="js/register-sw.js"></script>
</body>
</html>
